siyi_node:
  ros__parameters:
    host: "192.168.144.25"
    port: 37260
    transport: "udp"          # udp | tcp | serial
    serial_device: "/dev/ttyUSB0"
    baud_rate: 115200
    timeout: 2.0
    auto_reconnect: false
    attitude_stream_hz: 10

    # --- TF broadcasting ---
    # Set publish_tf: true to broadcast a dynamic transform on every attitude
    # update.  The transform expresses the gimbal orientation relative to
    # tf_parent_frame (typically the vehicle body frame).
    # The translation component is always zero here; use a separate
    # static_transform_publisher to express the gimbal mount offset on the
    # vehicle.
    publish_tf: false
    tf_parent_frame: "base_link"   # parent frame (vehicle body)
    tf_child_frame: "siyi_gimbal"  # gimbal frame (matches /siyi/attitude frame_id)
